unit-test:
  stage: unit-test
  needs: []
  script:
    - python3 -m black --check .
    - python3 -m pytest --mypy --timeout 300 --cov --cov-report term --cov-report xml --junitxml=junit.xml -v
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: junit.xml
  retry: 1
  interruptible: true
